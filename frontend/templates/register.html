{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Déchets Urbains</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
</head>
<body class="login-body">
<div class="container">
  <div class="card login-card shadow-sm">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🗑️</div>
        <h4 class="fw-bold mb-1">Créer un compte</h4>
        <p class="text-muted small mb-0">Rejoignez la plateforme de gestion des déchets urbains</p>
      </div>

      <div id="alert-box"></div>

      <form id="register-form">
        <div class="mb-3">
          <label class="form-label">Nom d'utilisateur</label>
          <input type="text" class="form-control" id="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Email (optionnel)</label>
          <input type="email" class="form-control" id="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="password" required minlength="6">
          <div class="form-text">6 caractères minimum.</div>
        </div>
        <button type="submit" class="btn btn-dechets w-100" id="submit-btn">
          Créer mon compte
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="{% url 'frontend:login' %}" class="small text-decoration-none">
          <i class="bi bi-arrow-left"></i> J'ai déjà un compte
        </a>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'frontend/js/api.js' %}"></script>
<script>
  if (TokenStore.isLoggedIn()) {
    window.location.href = '/app/';
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Création en cours...';

    try {
      const res = await fetch('/api/auth/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err.username ? err.username[0] : (err.password ? err.password[0] : "Erreur lors de la création du compte.");
        showAlert('alert-box', msg);
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
        return;
      }

      const loginRes = await fetch('/api/auth/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await loginRes.json();
      TokenStore.set(data.access, data.refresh);
      localStorage.setItem('username', username);
      window.location.href = '/app/';
    } catch (err) {
      showAlert('alert-box', "Impossible de contacter le serveur.");
      btn.disabled = false;
      btn.textContent = 'Créer mon compte';
    }
  });
</script>
</body>
</html>
