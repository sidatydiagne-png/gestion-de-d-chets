{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Gestion des Déchets Urbains</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
</head>
<body class="login-body">
<div class="container">
  <div class="card login-card shadow-sm">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🗑️</div>
        <h4 class="fw-bold mb-1">Déchets Urbains</h4>
        <p class="text-muted small mb-0">Espace administrateur — connectez-vous pour gérer la plateforme</p>
      </div>

      <div id="alert-box"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Nom d'utilisateur</label>
          <input type="text" class="form-control" id="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-dechets w-100" id="submit-btn">
          Se connecter
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="{% url 'frontend:carte' %}" class="small text-muted text-decoration-none">
          <i class="bi bi-arrow-left"></i> Retour à l'espace public (carte & signalements)
        </a>
      </div>
      <div class="text-center mt-2">
        <a href="{% url 'frontend:register' %}" class="small text-decoration-none">
          <i class="bi bi-person-plus"></i> Pas encore de compte ? S'inscrire
        </a>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'frontend/js/api.js' %}"></script>
<script>
  // Si déjà connecté, aller direct au tableau de bord
  if (TokenStore.isLoggedIn()) {
    window.location.href = '/app/';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Connexion...';

    try {
      const res = await fetch('/api/auth/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) {
        showAlert('alert-box', "Identifiants incorrects. Vérifiez votre nom d'utilisateur et mot de passe.");
        btn.disabled = false;
        btn.textContent = 'Se connecter';
        return;
      }

      const data = await res.json();
      TokenStore.set(data.access, data.refresh);
      localStorage.setItem('username', username);
      window.location.href = '/app/';
    } catch (err) {
      showAlert('alert-box', "Impossible de contacter le serveur.");
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  });
</script>
</body>
</html>
