{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestion des Déchets Urbains{% endblock %}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-dechets mb-4" id="main-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="{% url 'frontend:dashboard' %}">
      <span class="brand-icon">🗑️</span> Déchets Urbains
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'frontend:dashboard' %}">Tableau de bord</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'frontend:signalements_list' %}">Signalements</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'frontend:carte' %}">Carte</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'frontend:zones' %}">Zones</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'frontend:collectes' %}">Collectes</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item d-flex align-items-center">
          <span class="text-white-50 me-3 small" id="nav-username"></span>
        </li>
        <li class="nav-item" id="logout-item">
          <button class="btn btn-outline-light btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> Déconnexion
          </button>
        </li>
        <li class="nav-item d-none" id="login-item">
          <a class="btn btn-outline-light btn-sm" href="/app/login/">
            <i class="bi bi-shield-lock"></i> Connexion admin
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="{% static 'frontend/js/api.js' %}"></script>
<script>
  const AUTH_REQUIRED = {% block auth_required %}true{% endblock %};
  if (AUTH_REQUIRED) {
    requireAuth();
  }
  if (TokenStore.isLoggedIn()) {
    document.getElementById('nav-username').textContent = localStorage.getItem('username') || '';
    document.getElementById('logout-item').classList.remove('d-none');
    document.getElementById('login-item').classList.add('d-none');
  } else {
    document.getElementById('logout-item').classList.add('d-none');
    document.getElementById('login-item').classList.remove('d-none');
  }

  document.querySelectorAll('#navMenu .nav-link').forEach(link => {
    if (link.getAttribute('href') === window.location.pathname) {
      link.classList.add('active');
    }
  });
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
